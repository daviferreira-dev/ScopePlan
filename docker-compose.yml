services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scopeplan
      POSTGRES_USER: scopeplan
      POSTGRES_PASSWORD: scopeplan_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scopeplan"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://scopeplan:scopeplan_dev@db:5432/scopeplan
      SECRET_KEY: dev-docker-secret-key-change-in-prod
      JWT_SECRET_KEY: dev-docker-jwt-key-change-in-prod
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      RATE_LIMIT_STORAGE_URI: memory://
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "flask db upgrade && python run.py"

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data:

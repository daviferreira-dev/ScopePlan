services:
  # ── Backend (Flask API) ──────────────────────────────────────────
  - type: web
    name: scopeplan-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5 run:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: scopeplan-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT_STORAGE_URI
        value: memory://
      - key: FERNET_KEY
        sync: false
      - key: HMAC_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FRONTEND_URL
        sync: false
      - key: MAIL_BACKEND
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

  # ── Frontend (React SPA) ────────────────────────────────────────
  - type: web
    name: scopeplan-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ──────────────────────────────────────────
databases:
  - name: scopeplan-db
    plan: free
